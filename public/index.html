<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Hệ sinh thái tri thức | Môi trường - Xã hội - Nông nghiệp</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="main-container">
  <div class="hero">
    <h1><i class="fas fa-charging-station"></i> Môi trường · Xã hội · Nông nghiệp</h1>
    <p>Hệ thống tab động: khám phá chi tiết về Biến đổi khí hậu, Khí nhà kính, Mô hình hóa, GIS & CSDL, cùng Công nghệ cao và Sản xuất nông nghiệp</p>
  </div>

  <div class="primary-tabs">
    <button class="primary-tab active-primary" data-primary="env"><i class="fas fa-leaf"></i> Môi trường</button>
    <button class="primary-tab" data-primary="society"><i class="fas fa-hand-holding-heart"></i> Xã hội</button>
    <button class="primary-tab" data-primary="agri"><i class="fas fa-tractor"></i> Nông nghiệp</button>
  </div>

  <div class="primary-content">
    <div class="primary-pane active-primary-pane" id="primary-env">
      <div class="sub-tab-bar">
        <button class="sub-tab-btn active-sub" data-sub="climate"><i class="fas fa-temperature-high"></i> Biến đổi khí hậu</button>
        <button class="sub-tab-btn" data-sub="ghg"><i class="fas fa-smog"></i> Khí nhà kính</button>
        <button class="sub-tab-btn" data-sub="modeling"><i class="fas fa-chart-line"></i> Mô hình hóa</button>
        <button class="sub-tab-btn" data-sub="gisdb"><i class="fas fa-database"></i> Cơ sở dữ liệu & GIS</button>
      </div>
      <div id="sub-climate" class="sub-pane active-sub-pane"></div>
      <div id="sub-ghg" class="sub-pane"></div>
      <div id="sub-modeling" class="sub-pane"></div>
      <div id="sub-gisdb" class="sub-pane"></div>
    </div>

    <div class="primary-pane" id="primary-society"></div>

    <div class="primary-pane" id="primary-agri">
      <div class="sub-tab-bar">
        <button class="sub-tab-btn active-sub" data-sub-agri="high-tech"><i class="fas fa-microchip"></i> Công nghệ cao trong nông nghiệp</button>
        <button class="sub-tab-btn" data-sub-agri="production"><i class="fas fa-seedling"></i> Sản xuất nông nghiệp</button>
      </div>
      <div id="sub-hightech" class="sub-pane active-sub-pane"></div>
      <div id="sub-production" class="sub-pane"></div>
    </div>

    <div class="footer-note"></div>
  </div>
</div>

<script src="/js/data.js"></script>
<script src="/js/renderer.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
